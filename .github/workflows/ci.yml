name: CI Pipeline

# 1. Pipeline Trigger: Khi nào thì chạy?
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 2. Jobs: Các nhiệm vụ cần làm
jobs:
  # Job 1: Kiểm thử mã nguồn (Test)
  test-python-code:
    name: Run Pytest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Sử dụng cache để cài đặt nhanh hơn ở các lần sau
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Tests
        run: pytest -v

  # Job 2: Đóng gói và Triển khai (Build & Deploy)
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: test-python-code
    runs-on: ubuntu-latest
    
    # Cấp quyền cho GitHub Runner lấy OIDC token để nói chuyện với WIF của Google
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Google Auth (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/990324417574/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-ci-sa@khanh-fastapi-deploy-937.iam.gserviceaccount.com'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: asia-southeast1-docker.pkg.dev/khanh-fastapi-deploy-937/fastapi-demo/fastapi-demo-project:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fastapi-demo-project \
            --image asia-southeast1-docker.pkg.dev/khanh-fastapi-deploy-937/fastapi-demo/fastapi-demo-project:${{ github.sha }} \
            --platform managed \
            --region asia-southeast1 \
            --allow-unauthenticated \
            --port 8080
