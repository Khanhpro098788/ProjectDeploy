name: CI Pipeline

# 1. Pipeline Trigger: Khi nào thì chạy?
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 2. Jobs: Các nhiệm vụ cần làm
jobs:
  # Job 1: Kiểm thử mã nguồn (Test)
  test-python-code:
    name: Run Pytest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Sử dụng cache để cài đặt nhanh hơn ở các lần sau
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Tests
        run: pytest -v

  # Job 2: Đóng gói và Triển khai (Build & Deploy)
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: test-python-code
    runs-on: ubuntu-latest
    
    # Cấp quyền cho GitHub Runner lấy OIDC token để nói chuyện với WIF của Google
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Google Auth (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/990324417574/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-ci-sa@khanh-fastapi-deploy-937.iam.gserviceaccount.com'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://asia-southeast1-docker.pkg.dev
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: asia-southeast1-docker.pkg.dev/khanh-fastapi-deploy-937/fastapi-demo/fastapi-demo-project:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Deploy to GCP via SST
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          IMAGE_URL: asia-southeast1-docker.pkg.dev/khanh-fastapi-deploy-937/fastapi-demo/fastapi-demo-project:${{ github.sha }}
        run: npx sst deploy --stage dev
